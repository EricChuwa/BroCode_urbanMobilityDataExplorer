<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Lens — NYC Urban Mobility</title>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Leaflet.js — the map -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Our styles -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- A: NAVBAR -->
    <nav class="navbar">
      <div class="navbar-left">
        <div class="nav-icon">
          <i
            data-lucide="car-taxi-front"
            style="width: 18px; height: 18px; stroke: white; stroke-width: 1.5"
          ></i>
        </div>
        <span class="nav-title">City Lens</span>
      </div>

      <div class="navbar-right">
        <span class="nav-badge" id="trip-count">
          <svg
            width="11"
            height="11"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          <span id="trip-count-value">1.2M trips</span>
        </span>
        <button class="nav-toggle" id="theme-toggle">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
          </svg>
        </button>
      </div>
    </nav>
    <!-- B: STAT CARDS -->
    <section class="stat-cards">
      <div class="stat-card">
        <span class="stat-label">avg fare</span>
        <span class="stat-value" id="stat-fare">—</span>
      </div>

      <div class="stat-card">
        <span class="stat-label">avg distance</span>
        <span class="stat-value" id="stat-distance">—</span>
      </div>

      <div class="stat-card">
        <span class="stat-label">peak hour</span>
        <span class="stat-value" id="stat-peak">—</span>
      </div>

      <div class="stat-card">
        <span class="stat-label">top zone</span>
        <span class="stat-value" id="stat-zone">—</span>
      </div>
    </section>
    <!-- C: MAP + OVERLAYS -->
    <div class="map-wrapper">
      <div id="map"></div>

      <!-- D: ZOOM CONTROLS -->
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in" aria-label="Zoom in">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" id="zoom-out" aria-label="Zoom out">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>

      <!-- E: Chart button (top right) -->
      <!-- F: Slide-in panel -->
      <!-- G: Filter bar -->
    </div>
    <!-- F: SLIDE-IN PANEL -->
    <!-- G: FILTER BAR -->
    <!-- H: LEGEND -->

    <!-- Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js — the charts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <!-- Our logic -->
    <script src="app.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
