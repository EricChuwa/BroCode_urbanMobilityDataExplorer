<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Lens — NYC Urban Mobility</title>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Leaflet.js — the map -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Our styles -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- TOP SECTION -->
    <div class="top-section">
      <!-- A: NAVBAR -->
      <nav class="navbar">
        <div class="navbar-left">
          <div class="nav-icon">
            <i
              data-lucide="car-taxi-front"
              class="taxi-icon"
              style="width: 18px; height: 18px; stroke-width: 1.5"
            ></i>
          </div>
          <span class="nav-title">City Lens</span>
        </div>

        <div class="navbar-right">
          <span class="nav-badge" id="trip-count">
            <svg
              width="11"
              height="11"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            <span id="trip-count-value">1.2M trips</span>
          </span>
        </div>
      </nav>

      <!-- B: STAT CARDS -->
      <section class="stat-cards">
        <div class="stat-card">
          <span class="stat-label">avg fare</span>
          <span class="stat-value" id="stat-fare">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">avg distance</span>
          <span class="stat-value" id="stat-distance">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">peak hour</span>
          <span class="stat-value" id="stat-peak">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">top zone</span>
          <span class="stat-value" id="stat-zone">—</span>
        </div>
      </section>
    </div>
    <!-- C: MAP + OVERLAYS -->
    <div class="map-wrapper">
      <div id="map"></div>

      <!-- D: ZOOM CONTROLS -->
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in" aria-label="Zoom in">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" id="zoom-out" aria-label="Zoom out">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>

      <!-- E: CHART BUTTON -->
      <button
        class="chart-toggle-btn"
        id="chart-toggle"
        aria-label="Toggle insights panel"
      >
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
      </button>
      <!-- F: SLIDE-IN INSIGHTS PANEL -->
      <div class="insights-panel" id="insights-panel">
        <div class="panel-header">
          <span class="panel-title">Zone insights</span>
          <button class="panel-close" id="panel-close" aria-label="Close panel">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <div class="panel-zone" id="panel-zone">
          <div class="panel-zone-name" id="panel-zone-name">All zones</div>
          <div class="panel-zone-sub" id="panel-zone-sub">
            NYC · All boroughs
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-section-title">trip volume · by hour</div>
          <div class="chart-wrap">
            <canvas id="hourly-chart"></canvas>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-section-title">avg fare · by borough</div>
          <div class="chart-wrap">
            <canvas id="borough-chart"></canvas>
          </div>
        </div>

        <div class="panel-stats">
          <div class="panel-stat">
            <div class="panel-stat-label">avg fare</div>
            <div class="panel-stat-value" id="panel-fare">—</div>
          </div>
          <div class="panel-stat">
            <div class="panel-stat-label">pickups</div>
            <div class="panel-stat-value" id="panel-pickups">—</div>
          </div>
          <div class="panel-stat">
            <div class="panel-stat-label">avg distance</div>
            <div class="panel-stat-value" id="panel-distance">—</div>
          </div>
          <div class="panel-stat">
            <div class="panel-stat-label">peak hour</div>
            <div class="panel-stat-value" id="panel-peak">—</div>
          </div>
        </div>
      </div>
      <!-- G: FILTER BAR -->
      <div class="filter-bar">
        <div class="filter-group">
          <label class="filter-label">
            <svg
              width="11"
              height="11"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            Hour
          </label>
          <div class="filter-inputs">
            <input
              type="number"
              class="filter-input"
              id="hour-start"
              min="0"
              max="23"
              value="0"
              placeholder="0"
            />
            <span class="filter-sep">—</span>
            <input
              type="number"
              class="filter-input"
              id="hour-end"
              min="0"
              max="23"
              value="23"
              placeholder="23"
            />
          </div>
        </div>

        <div class="filter-divider"></div>

        <div class="filter-group">
          <label class="filter-label">
            <svg
              width="11"
              height="11"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
            Borough
          </label>
          <select class="filter-select" id="borough-filter">
            <option value="">All</option>
            <option value="Manhattan">Manhattan</option>
            <option value="Brooklyn">Brooklyn</option>
            <option value="Queens">Queens</option>
            <option value="Bronx">Bronx</option>
            <option value="Staten Island">Staten Island</option>
          </select>
        </div>

        <div class="filter-divider"></div>

        <div class="filter-group">
          <label class="filter-label">
            <svg
              width="11"
              height="11"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <line x1="12" y1="1" x2="12" y2="23" />
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
            Fare
          </label>
          <div class="filter-inputs">
            <input
              type="number"
              class="filter-input"
              id="fare-min"
              min="0"
              value="0"
              placeholder="$0"
            />
            <span class="filter-sep">—</span>
            <input
              type="number"
              class="filter-input"
              id="fare-max"
              min="0"
              value="100"
              placeholder="$100"
            />
          </div>
        </div>

        <div class="filter-divider"></div>

        <div class="filter-group">
          <label class="filter-label">
            <svg
              width="11"
              height="11"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 8 12 12 14 14" />
            </svg>
            Distance
          </label>
          <div class="filter-inputs">
            <input
              type="number"
              class="filter-input"
              id="dist-min"
              min="0"
              value="0"
              placeholder="0"
            />
            <span class="filter-sep">—</span>
            <input
              type="number"
              class="filter-input"
              id="dist-max"
              min="0"
              value="50"
              placeholder="50"
            />
          </div>
        </div>

        <button class="filter-apply" id="apply-filters">Apply</button>
      </div>
    </div>
    <!-- H: LEGEND BAR -->
    <div class="legend-bar">
      <div class="legend-left">
        <span class="legend-title">Activity</span>
        <div class="legend-items">
          <div class="legend-item">
            <div class="legend-dot high"></div>
            <span>High</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot medium"></div>
            <span>Medium</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot low"></div>
            <span>Low</span>
          </div>
        </div>
      </div>

      <span class="legend-hint">
        <svg
          width="11"
          height="11"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        Click any zone to explore
      </span>
    </div>

    <!-- Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js — the charts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <!-- Our logic -->
    <script src="app.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
